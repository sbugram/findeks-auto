name: Findeks Credit Score

on:
  # Every Tuesday at 07:00 UTC
  schedule:
    - cron: '0 7 * * 2'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    name: Run Findeks Automation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome (latest stable)
        uses: browser-actions/setup-chrome@v1

      - name: Run Findeks automation
        run: npm test
        env:
          FINDEKS_TC:          ${{ secrets.FINDEKS_TC }}
          FINDEKS_PASSWORD:    ${{ secrets.FINDEKS_PASSWORD }}
          UPSTASH_URL:         ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN:       ${{ secrets.UPSTASH_TOKEN }}
          FINDEKS_LOGIN_URL:   https://isube.findeks.com/ers/login.xhtml

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webdriverio-error-shots
          path: errorShots/
          retention-days: 7
